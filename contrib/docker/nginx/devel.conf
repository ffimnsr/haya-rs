limit_req_zone $binary_remote_addr zone=general_per_ip:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=sensitive_per_ip:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

upstream haya_upstream {
  server haya:9999;
  keepalive 16;
}

server {
  listen 8080;
  listen [::]:8080;
  server_name _;

  server_tokens off;
  client_max_body_size 1m;
  client_body_buffer_size 16k;
  client_body_timeout 10s;
  client_header_timeout 10s;
  keepalive_timeout 15s;
  send_timeout 10s;
  reset_timedout_connection on;
  ignore_invalid_headers on;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'" always;
  add_header Cache-Control "no-store" always;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection "";
  proxy_hide_header X-Powered-By;

  proxy_connect_timeout 5s;
  proxy_send_timeout 30s;
  proxy_read_timeout 30s;
  proxy_buffering on;
  proxy_request_buffering on;

  limit_conn conn_per_ip 20;

  if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$) {
    return 405;
  }

  location = /health {
    proxy_pass http://haya_upstream;
  }

  location ~ ^/(authorize|callback|signup|token|verify|recover|resend|magiclink|otp|logout|factors|mfa|admin|user) {
    limit_req zone=sensitive_per_ip burst=20 nodelay;
    proxy_pass http://haya_upstream;
  }

  location / {
    limit_req zone=general_per_ip burst=60 nodelay;
    proxy_pass http://haya_upstream;
  }
}
